name: pixels_to_macros
description: >
  Offline Multi-Food Calorie Scanner — thesis project.
  Uses on-device AR + ML to estimate food volume and calories.

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # UI helpers
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Permissions
  permission_handler: ^11.3.1

  # Image picking / camera capture
  image_picker: ^1.1.2

  # Barcode scanning
  mobile_scanner: ^7.0.0

  # HTTP client (for OpenFoodFacts barcode lookup)
  http: ^1.2.1

  # Speech-to-text for voice food logging (English only)
  speech_to_text: ^7.0.0

  # Local notifications (water & food reminders)
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/mascots/
    - assets/anatomy_body.png
    - assets/Calcium.png
    - assets/Iron.png
    - assets/Magnesium.png
    - assets/Potassium.png
    - assets/Sodium.png
    - assets/Zink.png
