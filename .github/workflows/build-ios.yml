name: Build iOS IPA

on:
  push:
    branches: [master, main]
  workflow_dispatch:   # lets you trigger it manually from GitHub UI

jobs:
  build:
    name: Flutter iOS (unsigned)
    runs-on: macos-15   # Xcode 16, supports iOS 17+ SDK

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Flutter ─────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"   # latest stable at time of writing
          channel: stable
          cache: true

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install Dart dependencies
        run: flutter pub get

      # ── 4. Code generation (Riverpod) ──────────────────────────────────────
      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # ── 5. Build unsigned iOS archive ─────────────────────────────────────
      - name: Build iOS (no-codesign)
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --dart-define=FLUTTER_TARGET=lib/main.dart

      # ── 6. Package into installable IPA ───────────────────────────────────
      - name: Package IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app \
                build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos
          zip -qr PixelsToMacros.ipa Payload
          echo "IPA created at build/ios/iphoneos/PixelsToMacros.ipa"

      # ── 7. Upload artifact ─────────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelsToMacros-unsigned-ipa
          path: build/ios/iphoneos/PixelsToMacros.ipa
          retention-days: 7
